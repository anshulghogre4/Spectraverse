name: Build & push backend to ghcr.io

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'semantic_mappings.json'
      - '.github/workflows/build-backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spectraverse-backend:latest
            ghcr.io/${{ github.repository_owner }}/spectraverse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
