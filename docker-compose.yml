version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - AZURE_BLOB_ACCOUNT=${AZURE_BLOB_ACCOUNT:-}
      - AZURE_BLOB_KEY=${AZURE_BLOB_KEY:-}
      - AZURE_VISION_API_KEY=${AZURE_VISION_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      # Explicit path so main.py finds the file inside the container
      - SEMANTIC_MAPPINGS_PATH=/app/semantic_mappings.json
    volumes:
      # Bind-mount so rule changes don't require a rebuild
      - ./semantic_mappings.json:/app/semantic_mappings.json:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked in at build time — pass as build args
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
